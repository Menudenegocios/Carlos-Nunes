
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu de Negócios | Conexão Local Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel para compilar TSX em tempo real no navegador (Essencial para rodar sem build local) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                primary: '#F67C01',
                secondary: '#C6C2B3',
                accent: '#F9D230',
                surface: '#F5F5DB',
                contrast: '#000000'
              }
            },
            fontFamily: {
              sans: ['Raleway', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
      body { 
        font-family: 'Raleway', sans-serif; 
        background-color: #F5F5DB;
        color: #000000;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .glass-card {
        background: rgba(245, 245, 219, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid #C6C2B3;
      }
      .dark .glass-card {
        background: rgba(0, 0, 0, 0.9);
        border: 1px solid rgba(198, 194, 179, 0.2);
      }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      
      .leaflet-popup-content-wrapper {
        border-radius: 1.5rem !important;
        padding: 0.5rem !important;
        font-family: 'Raleway', sans-serif !important;
      }
      .dark .leaflet-popup-content-wrapper {
        background: #18181b !important;
        color: white !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.10.1",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.45.4"
  }
}
</script>
</head>
  <body class="bg-brand-surface dark:bg-black text-brand-contrast dark:text-brand-surface antialiased">
    <div id="root"></div>
    <!-- Script modificado para carregar via Babel no navegador -->
    <script type="text/babel" data-type="module" src="index.tsx"></script>
  </body>
</html>
